name: Comment VRT Report
on:
  workflow_run:
    workflows: ["VRT"]
    types: [completed]
jobs:
  comment-vrt-report:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    # debugで一時的に全部許可する。debugが終わったら戻す
    permissions: write-all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const runId = context.payload.workflow_run.id;

            console.log("runId =", runId);
            console.log("workflow =", context.payload.workflow_run.name);

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            console.log(JSON.stringify(artifacts.data, null, 2));
            const playwrightResultsArtifact = artifacts.data.artifacts.find(
              (artifact) => artifact.name === "playwright-results"
            );
            if (!playwrightResultsArtifact) {
              console.log('"playwright-results" was not found');
              return;
            }
            console.log("playwright-results artifact=", playwrightResultsArtifact);
            console.log("playwright-results artifact id=", playwrightResultsArtifact.id);
            await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: playwrightResultsArtifact.id,
              archive_format: "zip",
            });
      - name: Download playwright results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: playwright-results
          path: ${{ github.workspace}}
          github-token: ${{ github.token }}
      - name: Comment PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          VRT_REPORT_PATH: ${{ github.workspace}}/playwright-results.json
        with:
          script: |
            const pr = context.payload.workflow_run.pull_requests?.[0];
            if (!pr) {
              core.info("workflow_run に紐づく PR が見つからないためコメントをスキップします");
              return;
            }
            const runId = context.payload.workflow_run.id;
            const prNumber = pr.number;
            const script = await import('${{ github.workspace }}/scripts/vrt-comment-pr.js');
            await script.default({ github, core, context, runId, prNumber });
